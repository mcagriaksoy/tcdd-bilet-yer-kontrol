<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>İletişim · TCDD Bilet Arama Botu</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/">
          <div class="brand-mark">
            <img src="/favicon.ico" alt="TCDD Bilet Arama Botu ikonu" class="brand-icon">
          </div>
          <div class="brand-copy">
            <strong>TCDD Bilet Arama Botu</strong>
            <span>eBilet takibini otomatikleştir</span>
          </div>
        </a>
      </div>
    </header>

    <main class="page legal-page">
      <section class="panel legal-panel">
        <p class="panel-kicker">İletişim</p>
        <h1 class="legal-title">Bizimle İletişime Geç</h1>
        <p class="subcopy">Aşağıdaki form üzerinden hızlıca mesaj gönderebilirsin.</p>

        <form class="contact-form" action="https://formspree.io/f/xvganlll" method="POST">
          <label class="field">
            <span>Ad Soyad</span>
            <input type="text" name="name" required>
          </label>
          <label class="field">
            <span>E-posta</span>
            <input type="email" name="email" required>
          </label>
          <label class="field">
            <span>Mesaj</span>
            <textarea name="message" rows="6" required></textarea>
          </label>
          <input type="hidden" name="_subject" value="TCDD Bilet Arama Botu İletişim Mesajı">
          <input type="text" name="_gotcha" class="hp-field" tabindex="-1" autocomplete="off">
          <button class="primary contact-submit" type="submit">Mesaj Gönder</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p>TCDD Bilet Arama Botu · Otomatik takip ve bildirim platformu</p>
        <p>
          <a href="/static/pages/iletisim.html">İletişim</a> ·
          <a href="/static/pages/gizlilik.html">Gizlilik</a> ·
          <a href="/static/pages/kullanim-kosullari.html">Kullanım Koşulları</a>
        </p>
      </div>
    </footer>
  </body>
  </html>
